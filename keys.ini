# Music Identifier — Configuration
# Copy this file to keys.ini and fill in your values.
# keys.ini should never be committed to version control.

[acoustid]
# Required — https://acoustid.org/login
api_key = ACOUSTID_KEY

[audiotag]
# Optional — https://audiotag.info/apisection
api_key = AUDIOTAG_KEY

[audd]
# Optional — https://audd.io (free: 1000 req/month, no expiry)
api_key = AUDD_KEY

[songfinder]
# Optional — https://rapidapi.com/songfinder-songfinder-default/api/songfinder-file-recognition
api_key = SONGFINDER_KEY

[settings]
# Auto-rename if similarity >= this value. Below this, you will be prompted.
# Range: 0-100. Default: 70
similarity_threshold = 70

# Stop querying engines early if similarity >= this value (stop_when_very_hi mode only).
# Range: 0-100. Default: 90
early_stop_threshold = 90

# Seconds to wait for confirmation before auto-skipping.
# Default: 120
confirm_timeout = 120

# Minimum seconds to wait between SongFinder API calls (rate limit: 1 req/min).
# Default: 60
songfinder_min_interval = 60

# Tiebreaker when similarity and consensus are equal.
# 'shorter' = prefer concise titles, avoids bloated entries like
#             "The Fight (Instrumental) (From "Over The Top" Soundtrack)"
# 'longer'  = prefer detailed titles, picks most complete metadata
# Default: shorter
title_length_preference = longer
